<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunArt by OpangDarmawan - Auto Smooth Drawing</title>
    <!-- Menggunakan Tailwind CSS untuk styling yang cepat dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hanya mencegah scroll otomatis di dalam body, tapi membiarkan UI bisa disentuh */
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
        }
        /* Mencegah kanvas tergeser saat kita mencoret menggunakan jari di HP */
        #drawingCanvas {
            touch-action: none;
            cursor: crosshair;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans overflow-hidden">

    <!-- Header / Judul Aplikasi -->
    <header class="bg-white shadow-sm border-b border-gray-200 p-3 sm:p-4 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md">
                FA
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">FunArt</h1>
                <p class="text-xs text-indigo-600 font-medium">by OpangDarmawan</p>
            </div>
        </div>
        <div class="text-sm text-gray-500 hidden sm:block bg-gray-100 px-3 py-1 rounded-full">
            ✨ Coretan otomatis menjadi halus
        </div>
    </header>

    <!-- Toolbar Alat Menggambar -->
    <div class="bg-white px-4 py-3 flex flex-wrap gap-3 items-center justify-center sm:justify-start border-b border-gray-200 z-20 shadow-sm text-sm">
        
        <!-- Pilihan Alat (Tools) -->
        <div class="flex items-center bg-gray-100 p-1 rounded-lg border border-gray-200">
            <button class="tool-btn flex items-center justify-center w-8 h-8 rounded-md transition text-gray-500 hover:bg-gray-200" data-tool="pena" title="Pena (Tegas)">🖊️</button>
            <button class="tool-btn flex items-center justify-center w-8 h-8 rounded-md transition text-gray-500 hover:bg-gray-200" data-tool="pensil" title="Pensil (Tipis & Transparan)">✏️</button>
            <button class="tool-btn flex items-center justify-center w-8 h-8 rounded-md transition text-gray-500 hover:bg-gray-200" data-tool="kuas" title="Kuas (Tebal & Lembut)">🖌️</button>
            <button class="tool-btn flex items-center justify-center w-8 h-8 rounded-md transition text-gray-500 hover:bg-gray-200" data-tool="eraser" title="Penghapus">🧼</button>
        </div>

        <!-- Pemilih Warna -->
        <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100">
            <input type="color" id="colorPicker" value="#000000" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent">
            <!-- Palet warna cepat -->
            <div class="flex gap-1 ml-1 border-l pl-2 border-gray-200">
                <button class="color-btn w-6 h-6 rounded-full bg-black border border-gray-300 shadow-sm transition transform hover:scale-110" data-color="#000000"></button>
                <button class="color-btn w-6 h-6 rounded-full bg-red-500 border border-gray-300 shadow-sm transition transform hover:scale-110" data-color="#ef4444"></button>
                <button class="color-btn w-6 h-6 rounded-full bg-blue-500 border border-gray-300 shadow-sm transition transform hover:scale-110" data-color="#3b82f6"></button>
                <button class="color-btn w-6 h-6 rounded-full bg-green-500 border border-gray-300 shadow-sm transition transform hover:scale-110" data-color="#22c55e"></button>
                <button class="color-btn w-6 h-6 rounded-full bg-white border border-gray-300 shadow-sm transition transform hover:scale-110" data-color="#ffffff"></button>
            </div>
        </div>

        <!-- Pengatur Ketebalan Garis -->
        <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100 flex-grow max-w-[150px]">
            <label for="brushSize" class="text-xs font-medium text-gray-700">Tebal:</label>
            <input type="range" id="brushSize" min="1" max="50" value="5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
        </div>

        <!-- Fitur Tracing (Upload & Opacity) -->
        <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100">
            <input type="file" id="uploadTracing" accept="image/*" class="hidden">
            <button id="uploadTracingBtn" class="text-xs font-medium text-gray-700 flex items-center gap-1 hover:text-indigo-600 transition" title="Upload Gambar untuk Dijiplak">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                <span class="hidden md:inline">Tracing</span>
            </button>
            <div id="opacityControl" class="hidden flex items-center gap-1 ml-1 pl-2 border-l border-gray-200">
                <span class="text-[10px] text-gray-500">Pudar:</span>
                <input type="range" id="tracingOpacity" min="5" max="100" value="40" class="w-14 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
        </div>

        <!-- Tombol Aksi (Undo, Hapus, Simpan) -->
        <div class="flex items-center gap-2 ml-auto">
            <button id="smoothBtn" class="flex items-center gap-1 px-3 py-2 bg-gradient-to-r from-purple-500 to-indigo-600 border border-transparent rounded-lg text-sm font-bold text-white hover:opacity-90 transition shadow-md active:scale-95" title="Ubah Coretan Jadi Geometris (Lurus/Melengkung Sempurna)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H5"/><path d="M19 16h-2"/><path d="M14 22v-2"/></svg>
                <span class="hidden sm:inline">Rapihkan</span>
            </button>
            <button id="undoBtn" class="flex items-center gap-1 px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-indigo-600 transition shadow-sm active:bg-gray-100" title="Batal (Undo)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                <span class="hidden lg:inline">Undo</span>
            </button>
            <button id="clearBtn" class="flex items-center gap-1 px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-red-600 hover:bg-red-50 transition shadow-sm active:bg-red-100" title="Bersihkan Kanvas">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                <span class="hidden lg:inline">Bersihkan</span>
            </button>
            <button id="downloadBtn" class="flex items-center gap-1 px-3 py-2 bg-indigo-600 border border-indigo-600 rounded-lg text-sm font-medium text-white hover:bg-indigo-700 transition shadow-sm active:bg-indigo-800" title="Simpan Gambar HD">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                <span class="hidden lg:inline">Simpan</span>
            </button>
        </div>
    </div>

    <!-- Area Kanvas yang Solid dan Anti-Bentrok -->
    <main class="flex-grow bg-gray-200 p-4 sm:p-6 flex flex-col relative z-10">
        <!-- Kontainer Kertas -->
        <div id="canvasContainer" class="flex-grow bg-white shadow-xl rounded-xl overflow-hidden border border-gray-300 relative w-full h-full">
            
            <!-- Gambar Tracing (Layer Bawah) -->
            <img id="tracingImage" class="absolute inset-0 w-full h-full object-contain opacity-40 hidden pointer-events-none" />
            
            <!-- Kanvas Menggambar (Layer Atas) -->
            <canvas id="drawingCanvas" class="absolute inset-0 w-full h-full block z-10"></canvas>
            
        </div>
        
        <!-- Pesan Bantuan -->
        <div id="welcomeMessage" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-500 z-20">
            <div class="bg-white/90 backdrop-blur px-6 py-4 rounded-2xl shadow-xl text-center border border-gray-200">
                <p class="text-gray-800 font-bold mb-1 text-lg">Mulai Menggambar!</p>
                <p class="text-gray-500 text-sm">Coret asal saja, lalu klik tombol "Rapihkan".</p>
            </div>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- INISIALISASI VARIABEL ---
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('canvasContainer');
        
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        
        const toolBtns = document.querySelectorAll('.tool-btn');
        const uploadTracingBtn = document.getElementById('uploadTracingBtn');
        const uploadTracingInput = document.getElementById('uploadTracing');
        const tracingImage = document.getElementById('tracingImage');
        const tracingOpacity = document.getElementById('tracingOpacity');
        const opacityControl = document.getElementById('opacityControl');

        const smoothBtn = document.getElementById('smoothBtn');
        const undoBtn = document.getElementById('undoBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const colorBtns = document.querySelectorAll('.color-btn');
        const welcomeMessage = document.getElementById('welcomeMessage');

        // State Aplikasi
        let isDrawing = false;
        let currentPath = []; 
        let savedPaths = [];  
        let currentTool = 'pena'; 
        
        // --- PENGATURAN KANVAS RESPONSIF ---
        function resizeCanvas() {
            if(!container) return;
            const rect = container.getBoundingClientRect();
            
            if (canvas.width !== Math.round(rect.width) || canvas.height !== Math.round(rect.height)) {
                canvas.width = Math.round(rect.width);
                canvas.height = Math.round(rect.height);
                redrawAllPaths();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);


        // ====================================================================
        // --- ALGORITMA PENYEMPURNAAN BENTUK (MELURUSKAN & MELENGKUNGKAN) ---
        // ====================================================================

        // Penghalus Akhir (Moving Average / Laplacian Smoothing)
        // Fungsi ini secara lembut menyetrika garis yang bergetar tanpa memotong koordinat, 
        // sehingga BENTUK ASLI SAMA SEKALI TIDAK BERUBAH atau menjadi kaku.
        function getSmoothedPoints(points, passes = 4) {
            if (points.length < 3) return points;
            let smoothed = [...points];
            for (let p = 0; p < passes; p++) {
                let temp = [smoothed[0]]; 
                for (let i = 1; i < smoothed.length - 1; i++) {
                    // Menggunakan rata-rata berbobot (weighted average) agar bentuk asli tidak menyusut/berubah
                    temp.push({
                        x: (smoothed[i - 1].x + smoothed[i].x * 2 + smoothed[i + 1].x) / 4,
                        y: (smoothed[i - 1].y + smoothed[i].y * 2 + smoothed[i + 1].y) / 4
                    });
                }
                temp.push(smoothed[smoothed.length - 1]); 
                smoothed = temp;
            }
            return smoothed;
        }


        // --- ALGORITMA MENGGAMBAR ---
        function drawSmoothPath(context, pathData) {
            if (!pathData.points || pathData.points.length === 0) return;

            context.save(); 
            context.beginPath();

            const points = pathData.points;
            const tool = pathData.tool || 'pena';
            const size = parseFloat(pathData.size) || 5;

            // Pengaturan Visual untuk Aneka Tool
            if (tool === 'pensil') {
                context.strokeStyle = pathData.color;
                context.lineWidth = Math.max(1, size * 0.4); 
                context.globalAlpha = 0.6; 
                context.lineCap = 'butt'; 
                context.lineJoin = 'round';
            } else if (tool === 'kuas') {
                context.strokeStyle = pathData.color;
                context.lineWidth = size * 1.5; 
                context.globalAlpha = 0.3; 
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.shadowBlur = size * 0.5; 
                context.shadowColor = pathData.color;
            } else if (tool === 'eraser') {
                context.strokeStyle = '#ffffff'; 
                context.lineWidth = size;
                context.globalAlpha = 1.0;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.globalCompositeOperation = 'destination-out'; 
            } else {
                context.strokeStyle = pathData.color;
                context.lineWidth = size;
                context.globalAlpha = 1.0;
                context.lineCap = 'round';
                context.lineJoin = 'round';
            }

            // Jika hanya sisa 2 titik (misalnya garis lurus sempurna hasil RDP)
            if (points.length < 3) {
                context.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    context.lineTo(points[i].x, points[i].y);
                }
                context.stroke();
                context.restore(); 
                return;
            }

            // Menggambar Kurva untuk sisa titik (Bezier Curve)
            context.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length - 2; i++) {
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;
                context.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
            }

            context.quadraticCurveTo(
                points[points.length - 2].x, 
                points[points.length - 2].y, 
                points[points.length - 1].x, 
                points[points.length - 1].y
            );

            context.stroke();
            context.restore(); 
        }

        function redrawAllPaths() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            savedPaths.forEach(path => drawSmoothPath(ctx, path));

            if (isDrawing && currentPath.length > 0) {
                drawSmoothPath(ctx, {
                    points: currentPath,
                    color: colorPicker.value,
                    size: brushSize.value,
                    tool: currentTool
                });
            }
        }

        // --- PENANGANAN KOORDINAT YANG KOKOH ---
        function getCoordinates(event) {
            const rect = canvas.getBoundingClientRect();
            let clientX = 0, clientY = 0;

            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // --- EVENT MENGGAMBAR ---
        function startDrawing(e) {
            e.preventDefault(); 
            isDrawing = true;
            currentPath = [getCoordinates(e)];

            if(welcomeMessage && welcomeMessage.style.display !== 'none') {
                welcomeMessage.style.opacity = '0';
                setTimeout(() => welcomeMessage.style.display = 'none', 500);
            }
            redrawAllPaths();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const coords = getCoordinates(e);
            if (currentPath.length > 0) {
                const lastPoint = currentPath[currentPath.length - 1];
                const dist = Math.hypot(coords.x - lastPoint.x, coords.y - lastPoint.y);
                if (dist < 4) return; // Mencegah getaran mikro saat menggambar langsung
            }
            currentPath.push(coords);
            redrawAllPaths();
        }

        function stopDrawing(e) {
            if (!isDrawing) return;
            e.preventDefault();
            isDrawing = false;

            if (currentPath.length > 0) {
                savedPaths.push({
                    points: [...currentPath],
                    color: colorPicker.value,
                    size: brushSize.value,
                    tool: currentTool
                });
            }
            currentPath = []; 
            redrawAllPaths(); 
        }

        // Event Listeners (Mouse & Touch)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing); 

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);


        // --- LOGIKA TOMBOL & INPUT ---

        function setActiveTool(btnElement) {
            if(!btnElement) return;
            toolBtns.forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
                b.classList.add('text-gray-500');
            });
            btnElement.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
            btnElement.classList.remove('text-gray-500');
            currentTool = btnElement.getAttribute('data-tool');
        }

        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => setActiveTool(btn));
        });
        
        setActiveTool(document.querySelector('[data-tool="pena"]'));

        uploadTracingBtn.addEventListener('click', () => {
            uploadTracingInput.value = ''; 
            uploadTracingInput.click();
        });

        uploadTracingInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    tracingImage.src = event.target.result;
                    tracingImage.classList.remove('hidden');
                    opacityControl.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        tracingOpacity.addEventListener('input', (e) => {
            tracingImage.style.opacity = (parseFloat(e.target.value) / 100).toString();
        });


        // =================================================================
        // EKSEKUSI TOMBOL RAPIHKAN (SMOOTHING NON-DESTRUKTIF)
        // =================================================================
        smoothBtn.addEventListener('click', () => {
            if (savedPaths.length === 0) return;

            savedPaths = savedPaths.map(path => {
                // Hanya gunakan pelembutan matematis (Laplacian Smoothing)
                // Algoritma pemotong sudut (RDP) telah dihapus total agar bentuk tidak berubah.
                let optimized = getSmoothedPoints(path.points, 4);

                return {
                    ...path,
                    points: optimized
                };
            });
            
            // Efek kedip saat merapihkan
            canvas.style.transition = 'opacity 0.15s ease-in-out';
            canvas.style.opacity = '0.3';
            setTimeout(() => canvas.style.opacity = '1', 150);
            
            redrawAllPaths();
        });

        // Warna & Kontrol Lainnya
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorPicker.value = btn.getAttribute('data-color');
            });
        });

        undoBtn.addEventListener('click', () => {
            if (savedPaths.length > 0) {
                savedPaths.pop();
                redrawAllPaths();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin menghapus semua coretan?')) {
                savedPaths = [];
                tracingImage.classList.add('hidden');
                opacityControl.classList.add('hidden');
                tracingImage.src = '';
                redrawAllPaths();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const scale = 3; 
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = canvas.width * scale;
            tempCanvas.height = canvas.height * scale;
            
            tCtx.fillStyle = '#ffffff';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.scale(scale, scale);

            savedPaths.forEach(path => drawSmoothPath(tCtx, path));

            if (isDrawing && currentPath.length > 0) {
                drawSmoothPath(tCtx, {
                    points: currentPath,
                    color: colorPicker.value,
                    size: brushSize.value,
                    tool: currentTool
                });
            }

            const dataURL = tempCanvas.toDataURL('image/png', 1.0);
            const link = document.createElement('a');
            link.download = 'FunArt_OpangDarmawan_HD.png';
            link.href = dataURL;
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') undoBtn.click();
        });
    });
    </script>
</body>
</html>
